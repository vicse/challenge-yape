services:
  postgres:
    image: postgres:16-alpine
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    container_name: reto-yape-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reto_yape
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: reto-yape-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: reto-yape-kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: reto-yape-kafka-ui
    restart: always
    depends_on:
      - kafka
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  migrations:
    build:
      context: .
      target: builder
    container_name: reto-yape-migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: reto_yape
    command:
      [
        'node',
        '-r',
        'ts-node/register',
        './node_modules/typeorm/cli.js',
        'migration:run',
        '-d',
        'libs/cards/src/infrastructure/persistence/config/data-source.ts',
      ]
    restart: 'no'

  card-issuer:
    build:
      context: .
      target: card-issuer
    container_name: reto-yape-card-issuer
    restart: always
    depends_on:
      migrations:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    ports:
      - '3000:3000'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: reto_yape
      KAFKA_CLIENT_ID: card-issuer
      KAFKA_BROKERS: kafka:29092
      ISSUER_PORT: 3000
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/healthcheck']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  card-processor:
    build:
      context: .
      target: card-processor
    container_name: reto-yape-card-processor
    restart: always
    depends_on:
      migrations:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    ports:
      - '3001:3001'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: reto_yape
      KAFKA_CLIENT_ID: card-processor
      KAFKA_BROKERS: kafka:29092
      KAFKA_FROM_BEGINNING: 'false'
      PROCESSOR_PORT: 3001
      MAX_RETRIES_PROCESS_CARD: 3
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/healthcheck']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
